version: 2

updates:
  # ─── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Prague"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      github-actions-security:
        applies-to: security-updates
        patterns: ["*"]
      github-actions-all:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ─── Studio FE (apps/studio-fe) — npm / pnpm ──────────────────────────────
  - package-ecosystem: "npm"
    directory: "/apps/studio-fe"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Prague"
    labels:
      - "dependencies"
      - "studio-fe"
      - "javascript"
    commit-message:
      prefix: "deps(studio-fe)"
    groups:
      studio-fe-security:
        applies-to: security-updates
        patterns: ["*"]
      studio-fe-tauri:
        patterns: ["@tauri-apps/*"]
        update-types: ["minor", "patch"]
      studio-fe-react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
        update-types: ["minor", "patch"]
      studio-fe-dev:
        applies-to: version-updates
        dependency-type: "development"
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ─── Sidecar FE (apps/sidecar-fe) — pip ───────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/apps/sidecar-fe"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Prague"
    labels:
      - "dependencies"
      - "sidecar-fe"
      - "python"
    commit-message:
      prefix: "deps(sidecar-fe)"
    groups:
      sidecar-fe-security:
        applies-to: security-updates
        patterns: ["*"]
      sidecar-fe-fastapi:
        patterns: ["fastapi", "pydantic", "uvicorn", "httpx"]
        update-types: ["minor", "patch"]
      sidecar-fe-all-patch:
        applies-to: version-updates
        update-types: ["patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ─── Cargo (apps/studio-fe/src-tauri) ─────────────────────────────────────
  - package-ecosystem: "cargo"
    directory: "/apps/studio-fe/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Prague"
    labels:
      - "dependencies"
      - "rust"
      - "tauri"
    commit-message:
      prefix: "deps(rust)"
    groups:
      cargo-security:
        applies-to: security-updates
        patterns: ["*"]
      cargo-tauri:
        patterns: ["tauri", "tauri-*"]
        update-types: ["minor", "patch"]
      cargo-all-patch:
        applies-to: version-updates
        update-types: ["patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
